<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>무한매수법 가이드 - Infinite Buy</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; -webkit-font-smoothing: antialiased; }
/* === Base === */
:root {
  --bg: #0a0a0f;
  --bg-card: #14141f;
  --bg-hover: #1a1a2e;
  --border: #2a2a3e;
  --text: #e4e4ef;
  --text-dim: #8888a0;
  --accent: #6c5ce7;
  --accent-hover: #7c6cf7;
  --green: #00d68f;
  --green-dim: rgba(0, 214, 143, 0.12);
  --red: #ff6b6b;
  --red-dim: rgba(255, 107, 107, 0.12);
  --blue: #4da6ff;
  --blue-dim: rgba(77, 166, 255, 0.12);
  --radius: 10px;
  --radius-sm: 6px;
}

body {
  background: var(--bg);
  color: var(--text);
  line-height: 1.5;
}

a {
  color: var(--accent);
  text-decoration: none;
}
a:hover {
  color: var(--accent-hover);
}

/* === Layout === */
.app-layout {
  min-height: 100vh;
}

.topbar {
  display: flex;
  align-items: center;
  gap: 24px;
  padding: 0 32px;
  height: 60px;
  background: var(--bg-card);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 100;
}

.topbar-left {
  display: flex;
  align-items: baseline;
  gap: 10px;
}

.logo {
  font-size: 18px;
  font-weight: 700;
  color: var(--accent);
}

.logo-sub {
  font-size: 12px;
  color: var(--text-dim);
}

.topbar-nav {
  display: flex;
  gap: 4px;
  margin-left: auto;
}

.topbar-nav a {
  padding: 8px 16px;
  border-radius: var(--radius-sm);
  color: var(--text-dim);
  font-size: 14px;
  font-weight: 500;
  transition: all 0.15s;
}
.topbar-nav a:hover {
  color: var(--text);
  background: var(--bg-hover);
}
.topbar-nav a.active {
  color: var(--accent);
  background: rgba(108, 92, 231, 0.12);
}

.topbar-right {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-left: 16px;
}

.status-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--green);
  box-shadow: 0 0 6px var(--green);
}
.status-dot.paused {
  background: var(--red);
  box-shadow: 0 0 6px var(--red);
}

.status-text {
  font-size: 12px;
  color: var(--text-dim);
}

.main-content {
  max-width: 1200px;
  margin: 0 auto;
  padding: 32px 24px;
}

/* === Page === */
.page-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 24px;
}

.page h2 {
  font-size: 24px;
  font-weight: 700;
  margin-bottom: 4px;
}

.section-title {
  font-size: 16px;
  font-weight: 600;
  margin: 32px 0 16px;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

.section-desc {
  color: var(--text-dim);
  font-size: 14px;
  margin-bottom: 8px;
}

/* === Stats === */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
  margin-bottom: 24px;
}
.stats-grid--3 {
  grid-template-columns: repeat(3, 1fr);
}

.stats-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
}

.stats-label {
  font-size: 12px;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-bottom: 8px;
}

.stats-value {
  font-size: 28px;
  font-weight: 700;
}

.stats-sub {
  font-size: 13px;
  color: var(--text-dim);
  margin-top: 4px;
}

.stats-card--green .stats-value { color: var(--green); }
.stats-card--red .stats-value { color: var(--red); }
.stats-card--blue .stats-value { color: var(--blue); }
.stats-card--green { border-color: rgba(0, 214, 143, 0.2); }
.stats-card--red { border-color: rgba(255, 107, 107, 0.2); }
.stats-card--blue { border-color: rgba(77, 166, 255, 0.2); }

/* === Cycle Cards === */
.cycle-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
  gap: 16px;
}

.cycle-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
}

.cycle-card-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
}

.cycle-stock-code {
  font-size: 18px;
  font-weight: 700;
}

.cycle-stock-name {
  font-size: 13px;
  color: var(--text-dim);
}

.cycle-status {
  margin-left: auto;
  font-size: 12px;
  padding: 3px 10px;
  border-radius: 20px;
  font-weight: 600;
}
.cycle-status--active {
  background: var(--green-dim);
  color: var(--green);
}
.cycle-status--completed {
  background: var(--blue-dim);
  color: var(--blue);
}
.cycle-status--stopped {
  background: var(--red-dim);
  color: var(--red);
}

.cycle-card-body {
  padding: 16px 20px;
}

.cycle-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 6px 0;
  font-size: 14px;
}

.cycle-row span {
  color: var(--text-dim);
}

.progress-bar {
  height: 6px;
  background: var(--bg-hover);
  border-radius: 3px;
  margin: 12px 0;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 3px;
  transition: width 0.3s;
}

.cycle-card-footer {
  padding: 12px 20px;
  border-top: 1px solid var(--border);
  display: flex;
  justify-content: flex-end;
}

/* === Table === */
.table-wrap {
  overflow-x: auto;
}

.trade-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 14px;
}

.trade-table th {
  text-align: left;
  padding: 12px 16px;
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--text-dim);
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
}

.trade-table td {
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
}

.trade-table tbody tr:hover {
  background: var(--bg-hover);
}

.trade-table small {
  color: var(--text-dim);
}

.trade-note {
  max-width: 240px;
  white-space: normal !important;
  font-size: 12px;
  color: var(--text-dim);
}

/* === Badge === */
.badge {
  display: inline-block;
  font-size: 12px;
  font-weight: 600;
  padding: 2px 10px;
  border-radius: 20px;
}
.badge--buy {
  background: var(--green-dim);
  color: var(--green);
}
.badge--sell {
  background: var(--red-dim);
  color: var(--red);
}

/* === Buttons === */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 10px 20px;
  border: none;
  border-radius: var(--radius-sm);
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
}

.btn--primary {
  background: var(--accent);
  color: #fff;
}
.btn--primary:hover {
  background: var(--accent-hover);
}
.btn--primary:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

.btn--danger {
  background: var(--red-dim);
  color: var(--red);
}
.btn--danger:hover {
  background: rgba(255, 107, 107, 0.2);
}

.btn--ghost {
  background: transparent;
  color: var(--text-dim);
  border: 1px solid var(--border);
}
.btn--ghost:hover {
  color: var(--text);
  border-color: var(--text-dim);
}

.btn--sm {
  padding: 6px 14px;
  font-size: 12px;
}

.btn--tab {
  background: transparent;
  color: var(--text-dim);
  padding: 8px 16px;
  border-radius: var(--radius-sm);
}
.btn--tab:hover {
  color: var(--text);
  background: var(--bg-hover);
}
.btn--tab-active {
  color: var(--accent);
  background: rgba(108, 92, 231, 0.12);
}

/* === Filter Bar === */
.filter-bar {
  display: flex;
  gap: 4px;
  margin-bottom: 16px;
}

/* === Start Cycle Bar === */
.start-cycle-bar {
  display: flex;
  gap: 12px;
  align-items: center;
  padding: 16px 20px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 16px;
}

.start-cycle-bar select {
  flex: 1;
}

/* === Forms === */
select,
input[type='text'],
input[type='number'],
input[type='password'] {
  background: var(--bg);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 10px 14px;
  border-radius: var(--radius-sm);
  font-size: 14px;
  outline: none;
  transition: border-color 0.15s;
}
select:focus,
input:focus {
  border-color: var(--accent);
}

.form-group {
  margin-bottom: 20px;
}
.form-group label {
  display: block;
  font-size: 13px;
  font-weight: 600;
  margin-bottom: 6px;
  color: var(--text-dim);
}
.form-group input,
.form-group select {
  width: 100%;
}
.form-group small {
  display: block;
  margin-top: 4px;
  font-size: 12px;
  color: var(--text-dim);
}

.settings-form {
  max-width: 480px;
}

.settings-section {
  margin-bottom: 40px;
}

/* === Modal === */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.6);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 200;
}

.modal {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 32px;
  width: 100%;
  max-width: 440px;
}

.modal h2 {
  font-size: 20px;
  margin-bottom: 24px;
}

.modal-actions {
  display: flex;
  gap: 12px;
  justify-content: flex-end;
  margin-top: 24px;
}

/* === States === */
.loading {
  text-align: center;
  padding: 48px;
  color: var(--text-dim);
}

.empty-state {
  text-align: center;
  padding: 48px 24px;
  color: var(--text-dim);
  font-size: 14px;
  background: var(--bg-card);
  border: 1px dashed var(--border);
  border-radius: var(--radius);
}

/* === Cycle State Colors === */
.cycle-status--yellow {
  background: rgba(255, 193, 7, 0.12);
  color: #ffc107;
}
.cycle-status--dim {
  background: rgba(136, 136, 160, 0.12);
  color: var(--text-dim);
}

.cycle-reason {
  font-size: 12px;
  color: var(--text-dim);
  background: var(--bg);
  padding: 6px 10px;
  border-radius: var(--radius-sm);
  margin-bottom: 12px;
  line-height: 1.4;
}

/* === Config Cards === */
.config-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
  gap: 16px;
}

.config-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
}

.config-card h4 {
  font-size: 14px;
  font-weight: 600;
  color: var(--accent);
  margin-bottom: 12px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

.config-items {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.config-item {
  display: flex;
  justify-content: space-between;
  font-size: 13px;
  padding: 4px 0;
  border-bottom: 1px solid var(--border);
}

.config-key {
  color: var(--text-dim);
  font-family: ui-monospace, monospace;
}

.config-value {
  font-weight: 600;
  font-family: ui-monospace, monospace;
}

/* === Event Level Badges === */
.badge--level-info { background: var(--blue-dim); color: var(--blue); }
.badge--level-warn { background: rgba(255, 193, 7, 0.12); color: #ffc107; }
.badge--level-error { background: var(--red-dim); color: var(--red); }
.badge--level-critical { background: var(--red); color: #fff; }

/* === Order Status Badges === */
.badge--status-filled { background: var(--green-dim); color: var(--green); }
.badge--status-pending, .badge--status-open { background: var(--blue-dim); color: var(--blue); }
.badge--status-partial { background: rgba(255, 193, 7, 0.12); color: #ffc107; }
.badge--status-cancelled, .badge--status-expired { background: rgba(136, 136, 160, 0.12); color: var(--text-dim); }
.badge--status-rejected { background: var(--red-dim); color: var(--red); }

/* === Stats Grid 5 columns === */
.stats-grid {
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
}

/* === Recommended Cards === */
.recommended-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 16px;
  margin-bottom: 32px;
}

.recommended-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
}

.recommended-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
}

.recommended-symbol {
  font-size: 20px;
  font-weight: 700;
  margin-right: 10px;
}

.recommended-risk {
  font-size: 11px;
  font-weight: 600;
  padding: 2px 8px;
  border-radius: 20px;
}
.recommended-risk--mid { background: rgba(255, 193, 7, 0.12); color: #ffc107; }
.recommended-risk--high { background: var(--red-dim); color: var(--red); }
.recommended-risk--extreme { background: var(--red); color: #fff; }

.recommended-leverage {
  font-size: 14px;
  font-weight: 700;
  color: var(--accent);
  background: rgba(108, 92, 231, 0.12);
  padding: 4px 12px;
  border-radius: 20px;
}

.recommended-name {
  font-size: 13px;
  color: var(--text-dim);
  margin-bottom: 4px;
}

.recommended-tracking {
  font-size: 12px;
  color: var(--text-dim);
  margin-bottom: 12px;
}

.recommended-price-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 12px;
}

.recommended-price {
  font-size: 18px;
  font-weight: 700;
  font-family: ui-monospace, monospace;
}

.recommended-change {
  font-size: 14px;
  font-weight: 600;
  font-family: ui-monospace, monospace;
}
.recommended-change.up { color: var(--green); }
.recommended-change.down { color: var(--red); }

.recommended-sma {
  font-size: 11px;
  font-weight: 600;
  padding: 2px 8px;
  border-radius: 20px;
}
.recommended-sma.above { background: var(--green-dim); color: var(--green); }
.recommended-sma.below { background: var(--red-dim); color: var(--red); }

.recommended-reason {
  font-size: 13px;
  color: var(--text-dim);
  line-height: 1.5;
  padding-top: 12px;
  border-top: 1px solid var(--border);
}

/* === Strategy Visual === */
.strategy-section {
  margin-top: 32px;
}

.strategy-summary {
  font-size: 15px;
  color: var(--text-dim);
  margin-bottom: 24px;
  line-height: 1.6;
}

/* Phase Timeline */
.phase-timeline {
  display: flex;
  flex-direction: column;
  gap: 0;
  margin-bottom: 40px;
}

.phase-item {
  display: flex;
  gap: 20px;
}

.phase-connector {
  display: flex;
  flex-direction: column;
  align-items: center;
  min-width: 36px;
}

.phase-dot {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: var(--accent);
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: 14px;
  flex-shrink: 0;
}

.phase-line {
  width: 2px;
  flex: 1;
  background: var(--border);
  min-height: 24px;
}

.phase-content {
  padding-bottom: 24px;
}

.phase-name {
  font-size: 16px;
  font-weight: 700;
  margin-bottom: 4px;
}

.phase-desc {
  font-size: 14px;
  color: var(--text-dim);
  margin-bottom: 6px;
  line-height: 1.5;
}

.phase-example {
  font-size: 13px;
  color: var(--text);
  background: var(--bg);
  padding: 8px 12px;
  border-radius: var(--radius-sm);
  border-left: 3px solid var(--accent);
  margin-bottom: 6px;
}

.phase-param {
  font-size: 12px;
  color: var(--blue);
  background: var(--blue-dim);
  padding: 2px 8px;
  border-radius: 4px;
}

/* Simulation Chart */
.sim-info {
  font-size: 14px;
  color: var(--text-dim);
  margin-bottom: 16px;
  font-family: ui-monospace, monospace;
}

.sim-chart {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-bottom: 40px;
}

.sim-row {
  display: flex;
  align-items: center;
  gap: 12px;
}

.sim-step {
  font-size: 12px;
  font-weight: 600;
  color: var(--text-dim);
  min-width: 52px;
  font-family: ui-monospace, monospace;
}

.sim-bar-area {
  width: 200px;
  height: 24px;
  background: var(--bg);
  border-radius: 4px;
  overflow: hidden;
  flex-shrink: 0;
}

.sim-bar {
  height: 100%;
  border-radius: 4px;
  transition: width 0.3s;
}
.sim-bar--buy { background: var(--accent); }
.sim-bar--hold { background: var(--border); }
.sim-bar--sell { background: var(--green); }

.sim-details {
  display: flex;
  gap: 12px;
  font-size: 12px;
  font-family: ui-monospace, monospace;
  flex-wrap: wrap;
}

.sim-price { color: var(--text); }
.sim-qty { color: var(--accent); font-weight: 600; }
.sim-invested { color: var(--text-dim); }
.sim-avg { color: var(--blue); }
.sim-action { color: var(--text-dim); font-style: italic; }
.sim-action--sell { color: var(--green); font-weight: 700; font-style: normal; }
.sim-pnl { color: var(--green); font-weight: 700; }

/* Risk Grid */
.risk-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 12px;
  margin-bottom: 32px;
}

.risk-item {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
}

.risk-name {
  font-size: 14px;
  font-weight: 700;
  color: var(--red);
  margin-bottom: 6px;
}

.risk-desc {
  font-size: 13px;
  color: var(--text-dim);
  margin-bottom: 8px;
  line-height: 1.5;
}

.risk-param {
  font-size: 12px;
  color: var(--blue);
  background: var(--blue-dim);
  padding: 2px 8px;
  border-radius: 4px;
}

/* === Guide Page === */
.guide-hero {
  text-align: center;
  margin-bottom: 40px;
}

.guide-hero h2 {
  font-size: 32px;
  margin-bottom: 8px;
}

.guide-subtitle {
  font-size: 18px;
  color: var(--accent);
  font-weight: 600;
  margin-bottom: 8px;
}

.guide-summary {
  font-size: 15px;
  color: var(--text-dim);
}

/* Analogy Card */
.guide-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 32px;
  margin-bottom: 40px;
}

.guide-card--highlight {
  border-color: var(--accent);
  border-width: 2px;
}

.guide-card__title {
  font-size: 20px;
  font-weight: 700;
  margin-bottom: 8px;
  color: var(--accent);
}

.guide-card__intro {
  font-size: 15px;
  color: var(--text-dim);
  margin-bottom: 24px;
  line-height: 1.6;
}

/* Story Timeline */
.story-timeline {
  display: flex;
  flex-direction: column;
  margin-bottom: 24px;
}

.story-item {
  display: flex;
  gap: 20px;
}

.story-connector {
  display: flex;
  flex-direction: column;
  align-items: center;
  min-width: 40px;
}

.story-dot {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  background: var(--accent);
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: 15px;
  flex-shrink: 0;
}

.story-line {
  width: 2px;
  flex: 1;
  background: var(--border);
  min-height: 16px;
}

.story-content {
  padding-bottom: 24px;
  flex: 1;
}

.story-scene {
  font-size: 16px;
  font-weight: 700;
  margin-bottom: 8px;
}

.story-analogy {
  font-size: 15px;
  color: var(--text);
  line-height: 1.6;
  margin-bottom: 8px;

function showTab(tab) {
  document.getElementById('strategy-tab').style.display = tab === 'strategy' ? '' : 'none';
  document.getElementById('manual-tab').style.display = tab === 'manual' ? '' : 'none';
  document.querySelectorAll('.tab-bar .btn').forEach((b, i) => {
    b.className = 'btn btn--tab' + (i === (tab === 'strategy' ? 0 : 1) ? ' btn--tab-active' : '');
  });
}
